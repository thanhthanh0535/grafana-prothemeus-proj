global:
  scrape_interval:     15s   
  evaluation_interval: 15s
scrape_configs:
  - job_name: 'prometheus'
    scrape_interval: 15s
    static_configs:
      - targets: ['10.0.0.10:9090']
  - job_name: "node"
    static_configs:
      - targets: ["10.0.0.10:9100"]
        labels:
          service: 'auth-service'
      - targets: ['10.0.0.10:9100']
        labels:
          service: 'payment-service'
      - targets: ['10.0.0.10:9100']
        labels:
          service: 'user-service'
